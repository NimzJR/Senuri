<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise for Senuri 💙🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sonu-pink: #d81b60; 
            --soft-pink: #fce4ec;
            --bg-gradient: linear-gradient(135deg, #fff5f6 0%, #fbc2eb 100%);
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh; /* මොබයිල් ඇඩ්‍රස් බාර් එක නිසා සයිස් එක වෙනස් වීම වළක්වයි */
            background: var(--bg-gradient);
            overflow: hidden;
            text-align: center;
            color: #333;
            padding: 15px;
        }

        .hidden { display: none !important; }

        #cat-screen { cursor: pointer; animation: fadeIn 1.2s ease; width: 100%; }
        
        .cat-icon {
            font-size: 80px; /* මොබයිල් එකට ගැළපෙන්න සයිස් එක ප්‍රශස්ත කළා */
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 { 
            color: var(--sonu-pink); 
            font-weight: 700; 
            font-size: 2rem; /* මොබයිල් Screen වලට ගැලපෙන සයිස් එක */
            margin: 20px 0 10px; 
        }

        /* කාඩ් එක ෆෝන් එකේ කපෙන්නේ නැති වෙන්න max-width දැම්මා */
        .card-wrapper { 
            width: 100%;
            max-width: 250px; 
            height: 340px; 
            perspective: 1000px; 
            margin: 20px auto; 
            cursor: pointer; 
        }
        
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        .flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 30px;
            display: flex; justify-content: center; align-items: center;
            border: 10px solid white; box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .card-front { background: var(--sonu-pink); color: white; font-size: 5rem; overflow: hidden; }
        .card-back { background: white; color: var(--sonu-pink); transform: rotateY(180deg); }
        
        .name-text { 
            font-size: 2.2rem; /* නම දිග වුණත් කාඩ් එකෙන් පිට පනින්නේ නැත */
            font-weight: 700; 
            color: var(--sonu-pink); 
            letter-spacing: -1px;
            word-break: break-word;
            padding: 10px;
        }

        #congrats-msg { margin-top: 15px; font-size: 1rem; color: #555; font-weight: 600; line-height: 1.6; animation: fadeIn 1s; padding: 0 10px; }
        .confetti { position: absolute; width: 10px; height: 10px; z-index: 100; pointer-events: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <audio id="bg-music" preload="auto">
        <source src="https://raw.githubusercontent.com/NimzJR/Senuri/main/SaveTik.io_7154690036997410075.mp3" type="audio/mpeg">
    </audio>

    <div id="block-screen" class="hidden">
        <div style="font-size: 80px;">🚫</div>
        <h1>Already Chosen!</h1>
        <p>Hi Senuri, you have already picked your name. <br> Hope you love it! 💙😍</p>
    </div>

    <div id="cat-screen" onclick="startFlow()">
        <div class="cat-icon">💙</div>
        <h1>Hi Senuri!</h1>
        <p>Tap the Heart to begin your surprise</p>
    </div>

    <div id="preview-screen" class="hidden">
        <p style="font-weight: 600; color: #777;">Remember these beautiful names... 💙</p>
        <div class="card-wrapper">
            <div class="card-inner">
                <div class="card-front" style="background: white;">
                    <div class="name-text" id="preview-text">...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="game-screen" class="hidden">
        <h2 id="status-title" style="color: #444;">Flip the card to reveal!</h2>
        <div class="card-wrapper" id="main-card" onclick="revealFinalName(this)">
            <div class="card-inner">
                <div class="card-front">?</div>
                <div class="card-back">
                    <div class="name-text" id="final-name"></div>
                </div>
            </div>
        </div>
        <div id="congrats-msg" class="hidden">
            Congratulations Senuri! 🥳💙<br>
            You got this beautiful name! 😍🌟💙
        </div>
    </div>

    <script>
        const nicknames = ["Kohila ale", "Hichchi", "Bassi", "Kichibichi", "Kochchi", "Boooo"];
        const formspreeID = "mvzldzdn";
        const music = document.getElementById('bg-music');

        window.onload = function() {
            if (localStorage.getItem("senuri_name")) {
                document.getElementById('cat-screen').classList.add('hidden');
                document.getElementById('block-screen').classList.remove('hidden');
            }
        };

        function startFlow() {
            document.getElementById('cat-screen').classList.add('hidden');
            document.getElementById('preview-screen').classList.remove('hidden');
            
            let i = 0;
            const pText = document.getElementById('preview-text');
            const interval = setInterval(() => {
                if(i < nicknames.length) {
                    pText.innerText = nicknames[i++];
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('preview-screen').classList.add('hidden');
                        document.getElementById('game-screen').classList.remove('hidden');
                        document.getElementById('final-name').innerText = nicknames[Math.floor(Math.random() * nicknames.length)];
                    }, 800);
                }
            }, 1200);
        }

        function revealFinalName(el) {
            if(!el.classList.contains('flipped')) {
                el.classList.add('flipped');
                const picked = document.getElementById('final-name').innerText;
                
                music.play().catch(e => console.log("Audio play blocked", e));
                
                document.getElementById('status-title').innerText = "Hello " + picked + "! 😍";
                document.getElementById('congrats-msg').classList.remove('hidden');
                
                localStorage.setItem("senuri_name", picked);
                
                fetch(`https://formspree.io/f/${formspreeID}`, {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ Target: "Senuri", Picked: picked, TimeStamp: new Date().toLocaleString() })
                });

                spawnConfetti();
            }
        }

        function spawnConfetti() {
            for(let i=0; i<60; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = '50%'; c.style.top = '50%';
                c.style.backgroundColor = ['#d81b60','#ff4081','#ffeb3b','#ffffff','#03a9f4'][Math.floor(Math.random()*5)];
                document.body.appendChild(c);
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 400 + 100;
                c.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) rotate(720deg) scale(0)`, opacity: 0 }
                ], { duration: 1500, easing: 'cubic-bezier(0, .9, .57, 1)' }).onfinish = () => c.remove();
            }
        }
    </script>
</body>
</html>
